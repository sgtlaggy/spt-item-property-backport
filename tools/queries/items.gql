{
  items {
    id
    types

    HandbookPrice: basePrice
    FleaPrice: avg24hPrice

    Accuracy: accuracyModifier
    Ergonomics: ergonomicsModifier
    Loudness: loudness
    Recoil: recoilModifier
    Velocity: velocity
    ConflictingItems: conflictingItems {
      id
    }
    properties {
      ... on ItemPropertiesAmmo {
        ammoAccr: accuracy
        ArmorDamage: armorDamage
        BallisticCoeficient: ballisticCoeficient
        BulletMassGram: bulletMassGrams
        Damage: damage
        DurabilityBurnModificator: durabilityBurnFactor
        MalfFeedChance: failureToFeedChance
        FragmentationChance: fragmentationChance
        HeatFactor: heatFactor
        HeavyBleedingDelta: heavyBleedModifier
        InitialSpeed: initialSpeed
        LightBleedingDelta: lightBleedModifier
        MalfMisfireChance: misfireChance
        PenetrationChanceObstacle: penetrationChance
        PenetrationPower: penetrationPower
        PenetrationPowerDiviation: penetrationPowerDeviation
        ammoRec: recoil
        StackMaxSize: stackMaxSize
      }
      ... on ItemPropertiesArmor {
        BluntThroughput: bluntThroughput
        weaponErgonomicPenalty: ergoPenalty
        speedPenaltyPercent: speedPenalty
        mousePenalty: turnPenalty
      }
      ... on ItemPropertiesArmorAttachment {
        BlindnessProtection: blindnessProtection
        BluntThroughput: bluntThroughput
        weaponErgonomicPenalty: ergoPenalty
        speedPenaltyPercent: speedPenalty
        mousePenalty: turnPenalty
      }
      ... on ItemPropertiesBarrel {
        CenterOfImpact: centerOfImpact
        DeviationCurve: deviationCurve
        DeviationMax: deviationMax
      }
      ... on ItemPropertiesChestRig {
        BluntThroughput: bluntThroughput
        weaponErgonomicPenalty: ergoPenalty
        speedPenaltyPercent: speedPenalty
        mousePenalty: turnPenalty
      }
      ... on ItemPropertiesFoodDrink {
        Energy: energy
        Hydration: hydration
        MaxResource: units
        Buffs: stimEffects {
          Chance: chance
          Delay: delay
          Duration: duration
          percent
          skill {
            id
          }
          skillName
          type
          Value: value
        }
      }
      ... on ItemPropertiesGlasses {
        BlindnessProtection: blindnessProtection
        BluntThroughput: bluntThroughput
        weaponErgonomicPenalty: ergoPenalty
      }
      ... on ItemPropertiesHeadphone {
        AmbientVolume: ambientVolume
        CompressorAttack: compressorAttack
        CompressorGain: compressorGain
        CompressorRelease: compressorRelease
        CompressorThreshold: compressorThreshold
        RolloffMultiplier: distanceModifier
        Distortion: distortion
        DryVolume: dryVolume
      }
      ... on ItemPropertiesHelmet {
        BlindnessProtection: blindnessProtection
        BlocksEarpiece: blocksHeadset
        BluntThroughput: bluntThroughput
        DeafStrength: deafening
        weaponErgonomicPenalty: ergoPenalty
        speedPenaltyPercent: speedPenalty
        mousePenalty: turnPenalty
      }
      ... on ItemPropertiesKey {
        MaximumNumberOfUsage: uses
      }
      ... on ItemPropertiesMagazine {
        CheckTimeModifier: ammoCheckModifier
        LoadUnloadModifier: loadModifier
        MalfunctionChance: malfunctionChance
      }
      ... on ItemPropertiesMedicalItem {
        EffectsDamage: cures
        MaxHpResource: uses
        medUseTime: useTime
      }
      ... on ItemPropertiesMedKit {
        EffectsDamage: cures
        MaxHpResource: hitpoints
        HeavyBleeding: hpCostHeavyBleeding
        LightBleeding: hpCostLightBleeding
        hpResourceRate: maxHealPerUse
        medUseTime: useTime
      }
      ... on ItemPropertiesNightVision {
        DiffuseIntensity: diffuseIntensity
        Intensity: intensity
        NoiseIntensity: noiseIntensity
        NoiseScale: noiseScale
      }
      ... on ItemPropertiesPainkiller {
        EffectsDamage: cures
        Energy: energyImpact
        Hydration: hydrationImpact
        PainDuration: painkillerDuration
        MaxHpResource: uses
        medUseTime: useTime
      }
      ... on ItemPropertiesStim {
        EffectsDamage: cures
        Buffs: stimEffects {
          Chance: chance
          Delay: delay
          Duration: duration
          percent
          skill {
            id
          }
          type
          Value: value
        }
        medUseTime: useTime
      }
      ... on ItemPropertiesSurgicalKit {
        EffectsDamage: cures
        healthPenaltyMax: maxLimbHealth
        healthPenaltyMin: minLimbHealth
        MaxHpResource: uses
        medUseTime: useTime
      }
      ... on ItemPropertiesWeapon {
        CameraSnap: cameraSnap
        CenterOfImpact: centerOfImpact
        DeviationCurve: deviationCurve
        DeviationMax: deviationMax
        RecoilAngle: recoilAngle
        RecolDispersion: recoilDispersion
        RecoilForceBack: recoilHorizontal
        RecoilForceUp: recoilVertical
      }
    }
  }
}